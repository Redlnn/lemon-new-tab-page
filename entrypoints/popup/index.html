<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/icon-64.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="manifest.type" content="browser_action" />
    <script src="/theme-init.js"></script>
    <style>
      html,
      html.light {
        background-color: #f2f3f5;
      }

      html.light {
        color-scheme: light;
      }

      html.dark {
        color-scheme: dark;
        background-color: #0a0a0a;
      }

      @media (prefers-color-scheme: light) {
        html {
          color-scheme: light;
          background-color: #f2f3f5;
        }
      }

      @media (prefers-color-scheme: dark) {
        html {
          color-scheme: dark;
          background-color: #0a0a0a;
        }
      }
    </style>
    <style>
      .hidden {
        display: none;
      }

      .fallback {
        box-sizing: border-box;
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
        margin: 0;
        color: #f5f7fa;
        background: #0f1115;
      }

      .fallback-content {
        width: 100%;
        max-width: 640px;
        padding: 20px;
        line-height: 1.6;
        background: #171a21;
        border: 1px solid #2a3040;
        border-radius: 10px;
      }

      .fallback-title {
        margin: 0 0 8px;
        font-size: 18px;
      }

      .fallback-desc {
        margin: 0 0 8px;
        opacity: 0.9;
      }

      .fallback-pre {
        padding: 12px;
        margin: 0;
        overflow-wrap: break-word;
        white-space: pre-wrap;
        background: #0f1115;
        border: 1px solid #2a3040;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <main id="fallback" class="fallback hidden">
      <section class="fallback-content">
        <h1 class="fallback-title">Popup startup failed</h1>
        <p class="fallback-desc">
          The popup failed to initialize. Please reload the extension or reopen the popup.
        </p>
        <pre class="fallback-pre"></pre>
      </section>
    </main>
  </body>
  <script type="module" src="./main.ts"></script>
</html>
